<style>
:root {
  --red: #E8281A;
  --red-soft: #FFF0EF;
  --dark: #1A1A1A;
  --mid: #666;
  --light: #F7F5F2;
  --white: #FFFFFF;
  --border: #EDEBE8;
  --radius: 16px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--light);
  color: var(--dark);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
}

/* LANGUAGE SELECTOR */
#lang-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  background: linear-gradient(160deg, #1A1A1A 0%, #2D1810 60%, #1A1A1A 100%);
  position: relative;
  overflow: hidden;
}

#lang-screen::before {
  content: '🍕';
  position: absolute;
  font-size: 320px;
  opacity: 0.04;
  top: -60px;
  right: -80px;
  transform: rotate(20deg);
  pointer-events: none;
}

.lang-logo {
  width: 80px;
  height: 80px;
  background: var(--red);
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  margin-bottom: 16px;
  box-shadow: 0 12px 40px rgba(232,40,26,0.4);
  animation: pop 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes pop {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.lang-title {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  color: white;
  text-align: center;
  margin-bottom: 4px;
  animation: fadeUp 0.5s ease 0.2s both;
}

.lang-sub {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 40px;
  animation: fadeUp 0.5s ease 0.3s both;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to { opacity:1; transform:translateY(0); }
}

.lang-prompt {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 20px;
  letter-spacing: 0.5px;
  animation: fadeUp 0.5s ease 0.4s both;
}

.lang-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  width: 100%;
  max-width: 340px;
  animation: fadeUp 0.5s ease 0.5s both;
}

.lang-btn {
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 16px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: all 0.2s;
  color: white;
}

.lang-btn:hover, .lang-btn:active {
  background: rgba(232,40,26,0.25);
  border-color: var(--red);
  transform: scale(0.97);
}

.lang-flag { font-size: 32px; line-height: 1; }
.lang-name { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; opacity: 0.85; }

/* MENU PAGE */
#menu-page { display: none; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

.menu-header {
  background: linear-gradient(145deg, #1A1A1A 0%, #2D1810 100%);
  padding: 40px 20px 28px;
  position: sticky;
  top: 0;
  z-index: 20;
}

.menu-header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.back-btn {
  background: rgba(255,255,255,0.1);
  border: none;
  color: white;
  width: 36px;
  height: 36px;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.back-btn:active { transform: scale(0.93); }

.menu-header-name {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: white;
  text-align: center;
  flex: 1;
}

.current-flag { font-size: 24px; }

/* LANG SWITCHER IN HEADER */
.lang-switcher {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 2px;
  scrollbar-width: none;
}
.lang-switcher::-webkit-scrollbar { display: none; }

.lang-pill {
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 5px 10px;
  display: flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  flex-shrink: 0;
}

.lang-pill.active {
  background: var(--red);
  border-color: var(--red);
}

.lang-pill-flag { font-size: 14px; }
.lang-pill-name { font-size: 10px; font-weight: 600; color: white; letter-spacing: 0.3px; }

/* MENU CONTENT */
.menu-content { padding: 0 0 40px; }

/* CATEGORY */
.category {
  margin-bottom: 8px;
}

.cat-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 20px 20px 10px;
  cursor: pointer;
  user-select: none;
}

.cat-emoji { font-size: 22px; }

.cat-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: var(--dark);
  flex: 1;
}

.cat-toggle {
  color: var(--mid);
  font-size: 18px;
  transition: transform 0.3s;
}

.cat-toggle.open { transform: rotate(180deg); }

.cat-divider {
  height: 2px;
  background: linear-gradient(to right, var(--red), transparent);
  margin: 0 20px 12px;
  border-radius: 2px;
}

.cat-items {
  overflow: hidden;
  transition: max-height 0.4s ease;
}

/* ITEM */
.menu-item {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--white);
  margin: 0 12px 4px;
  border-radius: var(--radius);
}

.item-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 4px;
}

.item-name {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 16px;
  color: var(--dark);
  flex: 1;
}

.item-price {
  font-weight: 700;
  font-size: 13px;
  color: var(--red);
  white-space: nowrap;
  padding-top: 2px;
}

.item-desc {
  font-size: 12px;
  color: var(--mid);
  line-height: 1.5;
}

/* SIZES ROW */
.sizes-row {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  flex-wrap: wrap;
}

.size-tag {
  background: var(--light);
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 600;
  color: var(--dark);
}

.size-tag span { color: var(--red); }

/* SUPPLEMENT */
.supplement-note {
  background: var(--red-soft);
  border-radius: 10px;
  padding: 10px 14px;
  margin: 0 12px 8px;
  font-size: 12px;
  color: var(--red);
  font-weight: 500;
}

/* SECTION SPACER */
.section-note {
  padding: 12px 20px 4px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--mid);
}
</style>

  fr: 'Tailles : 26cm / 33cm / 40cm · Supplément pâte épaisse : +1,50€ / +2,50€ / +3,50€',
  en: 'Sizes: 26cm / 33cm / 40cm · Thick crust supplement: +€1.50 / +€2.50 / +€3.50',
  es: 'Tamaños: 26cm / 33cm / 40cm · Suplemento masa gruesa: +1,50€ / +2,50€ / +3,50€',
  de: 'Größen: 26cm / 33cm / 40cm · Aufpreis dicker Boden: +1,50€ / +2,50€ / +3,50€',
  it: 'Taglie: 26cm / 33cm / 40cm · Supplemento pasta spessa: +1,50€ / +2,50€ / +3,50€',
  nl: 'Maten: 26cm / 33cm / 40cm · Toeslag dikke bodem: +€1,50 / +€2,50 / +€3,50',
};

const SIZE_LABELS = {
  fr: ['26cm','33cm','40cm'], en: ['26cm','33cm','40cm'], es: ['26cm','33cm','40cm'],
  de: ['26cm','33cm','40cm'], it: ['26cm','33cm','40cm'], nl: ['26cm','33cm','40cm'],
};

let currentLang = 'fr';

function setLang(lang) {
  currentLang = lang;
  document.getElementById('lang-screen').style.display = 'none';
  document.getElementById('menu-page').style.display = 'block';
  document.getElementById('current-flag').textContent = LANGS[lang].flag;
  buildLangSwitcher(lang);
  buildMenu(lang);
}

function buildLangSwitcher(active) {
  const el = document.getElementById('lang-switcher');
  el.innerHTML = Object.entries(LANGS).map(([code, l]) =>
    `<div class="lang-pill ${code===active?'active':''}" onclick="switchLang('${code}')">
      <span class="lang-pill-flag">${l.flag}</span>
      <span class="lang-pill-name">${l.name}</span>
    </div>`
  ).join('');
}

function switchLang(lang) {
  currentLang = lang;
  document.getElementById('current-flag').textContent = LANGS[lang].flag;
  buildLangSwitcher(lang);
  buildMenu(lang);
  document.getElementById('menu-page').scrollTop = 0;
}

function buildMenu(lang) {
  const data = MENU[lang];
  const content = document.getElementById('menu-content');
  const ORDER = ['starters','classics','voyages','mountains','maritime','kids','panipizzas','empanapizzas','desserts','drinks'];
  let html = '';
  ORDER.forEach((key, idx) => {
    const cat = data[key];
    if (!cat) return;
    html += `<div class="category">
      <div class="cat-header" onclick="toggleCat('cat-${key}')">
        <span class="cat-emoji">${cat.emoji}</span>
        <span class="cat-title">${cat.title}</span>
        <span class="cat-toggle open" id="toggle-${key}">▾</span>
      </div>
      <div class="cat-divider"></div>`;
    if (cat.supplement) {
      html += `<div class="supplement-note">${SUPPLEMENT_TEXT[lang]}</div>`;
    }
    if (cat.note) {
      html += `<div class="section-note">${cat.note}</div>`;
    }
    html += `<div class="cat-items" id="cat-${key}">`;
    cat.items.forEach(item => {
      html += `<div class="menu-item">
        <div class="item-header">
          <span class="item-name">${item.name}</span>
          ${item.price ? `<span class="item-price">${item.price}</span>` : ''}
        </div>
        ${item.desc ? `<div class="item-desc">${item.desc}</div>` : ''}
        ${item.sizes ? `<div class="sizes-row">
          ${item.sizes.map((p,i) => `<div class="size-tag">${SIZE_LABELS[lang][i]} <span>${p}</span></div>`).join('')}
        </div>` : ''}
      </div>`;
    });
    html += `</div></div>`;
  });
  content.innerHTML = html;
}

function toggleCat(id) {
  const el = document.getElementById(id);
  const key = id.replace('cat-','');
  const toggle = document.getElementById('toggle-'+key);
  if (el.style.maxHeight && el.style.maxHeight !== '0px') {
    el.style.maxHeight = '0px';
    toggle.classList.remove('open');
  } else {
    el.style.maxHeight = el.scrollHeight + 'px';
    toggle.classList.add('open');
  }
}

function goBack() {
  document.getElementById('menu-page').style.display = 'none';
  document.getElementById('lang-screen').style.display = 'flex';
}

// Init all cats open
function openAllCats() {
  document.querySelectorAll('.cat-items').forEach(el => {
    el.style.maxHeight = 'none';
  });
}
